<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Web Unificada</title>
    <style>
        /* --- ESTILOS CSS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0d1117; /* Fondo estilo modo oscuro de GitHub */
        }

        .calculator {
            background-color: #161b22;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            width: 320px;
        }

        #display {
            width: 100%;
            height: 60px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1.8rem;
            text-align: right;
            padding: 10px;
            margin-bottom: 20px;
            outline: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            border: none;
            border-radius: 8px;
            background-color: #21262d;
            color: #c9d1d9;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #30363d;
        }

        /* Colores especiales para destacar botones */
        .btn-operator {
            background-color: #1f6feb;
            color: white;
        }

        .btn-operator:hover {
            background-color: #388bfd;
        }

        .btn-clear {
            background-color: #da3633;
            color: white;
        }

        .btn-clear:hover {
            background-color: #f85149;
        }

        .btn-equal {
            grid-row: span 2;
            height: 110px;
            background-color: #238636;
            color: white;
        }

        .btn-equal:hover {
            background-color: #2ea043;
        }

        .btn-zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" readonly>
        
        <div class="buttons">
            <button onclick="clearDisplay()" class="btn-clear">C</button>
            <button onclick="appendValue('/')" class="btn-operator">/</button>
            <button onclick="appendValue('*')" class="btn-operator">*</button>
            <button onclick="deleteLast()" class="btn-delete">⌫</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('-')" class="btn-operator">-</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('+')" class="btn-operator">+</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="calculate()" class="btn-equal">=</button>

            <button onclick="appendValue('0')" class="btn-zero">0</button>
            <button onclick="appendValue('.')">.</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function appendValue(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = '';
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            try {
                if (display.value !== '') {
                    // Evalúa la cadena matemática introducida en la pantalla
                    display.value = eval(display.value);
                }
            } catch (error) {
                display.value = 'Error';
                setTimeout(clearDisplay, 1500);
            }
        }
    </script>
</body>
</html>
